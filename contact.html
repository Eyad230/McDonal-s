<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>McDonald's Contact</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      .contact {
        max-width: 700px;
        margin: 50px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .contact h2 {
        color: #e21414;
        margin-bottom: 20px;
      }

      .contact p {
        font-size: 18px;
        color: #333;
        line-height: 1.8;
      }

      .contact-info {
        margin-top: 20px;
      }

      .contact-info p {
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <nav>
      <img src="./mcdonalds.png" alt="McDonald's Logo" class="logo" />
      <h1>McDonald's</h1>
      <div class="menu-btn" id="menuBtn">☰</div>
    </nav>

    <div class="side-menu" id="menu">
      <a href="./index.html">Home</a>
      <a href="./About.html">About</a>
      <a href="./menu.html">Order</a>
      <a href="./contact.html">Contact</a>
      <br />
      <br />
      <a href="./contact.html">Back</a>
    </div>
    <section class="contact">
      <h2>Contact Us</h2>

      <p>
        We'd love to hear from you! If you have any questions, suggestions, or
        feedback, please contact us.
      </p>

      <div class="contact-info">
        <p><strong>Email:</strong> info@mcdonalds.com</p>
        <p><strong>Phone:</strong> +1 (800) 244-6227</p>
        <p><strong>Website:</strong> www.mcdonalds.com</p>
        <p><strong>Address:</strong> Chicago, Illinois, USA</p>
      </div>
    </section>
    <script src="./main.js"></script>
  </body>
</html>
